  - generic [ref=e24]:
    - heading "Try Dive" [level=1] [ref=e25]
    - paragraph [ref=e26]: Try scuba diving. The first time you breathe underwater is an experience to remember – and you will be surprised by just how much fun it is.
    - link "Contact" [ref=e27] [cursor=pointer]:
      - /url: /gbsacCore/Home/ContactUs
    - generic [ref=e29]:
      - heading "Never dived before?" [level=3] [ref=e30]
      - paragraph [ref=e31]: Guildford Sub-Aqua Club offers try diving sessions to anyone who is interested to give it a go and experience the thrill of breathing under water! We will supply you with all the necessary kit and you will spend between 30 minutes to an hour in the pool with an experienced qualified instructor, who will give you an insight into what we are sure you will find to be a most enjoyable experience.
      - paragraph [ref=e32]: This try dive is open to young* and old alike and all that we ask is that you bring with you an open mind and your swim suit and have fun!
      - paragraph [ref=e33]: "* Minimum Age for Membership of Guildford BSAC is 12."
  - generic [ref=e36]:
    - generic [ref=e37]:
      - heading "What will you learn?" [level=3] [ref=e38]
      - paragraph [ref=e39]: "Under the direct supervision of a BSAC Instructor, you will learn:"
      - list [ref=e40]:
        - listitem [ref=e41]: the basic safety guidelines and skills needed to dive.
        - listitem [ref=e42]: about scuba equipment and how easy it is to use.
        - listitem [ref=e43]: how to breathe underwater with scuba equipment.
        - listitem [ref=e44]: the correct fining technique and how to adjust buoyancy, whilst having fun swimming around and exploring.
        - listitem [ref=e45]: how to become a certified BSAC Ocean Diver.
    - generic [ref=e46]:
      - heading "When and where?" [level=3] [ref=e47]
      - paragraph [ref=e48]: All try dives take place in a swimming pool and must be arranged in advance. The cost is £25.00, which is fully refunded if you decide to join the club. Come to the Waterside Centre first so we can arrange equipment and introduce you to an instructor.
  - generic [ref=e51]:
    - generic [ref=e52]:
      - heading "Learn to Dive" [level=1] [ref=e53]
      - paragraph [ref=e54]: From beginner to experienced, BSAC provides a full training programme that enables divers to progress through a framework of qualifications at their own pace.
      - paragraph [ref=e55]: There are five internationally-recognised BSAC diver grades, from the entry level Ocean Diver through to our highest grade, First Class Diver.
    - generic [ref=e56]:
      - tablist [ref=e57]:
        - tab "Ocean Diver" [selected] [ref=e58] [cursor=pointer]
        - tab "Sports Diver" [ref=e59] [cursor=pointer]
        - tab "Dive Leader" [ref=e60] [cursor=pointer]
        - tab "Advanced Diver" [ref=e61] [cursor=pointer]
        - tab "First Class Diver" [ref=e62] [cursor=pointer]
      - tabpanel "Ocean Diver" [ref=e64]:
        - generic [ref=e66]:
          - heading "Ocean Diver" [level=2] [ref=e67]
          - paragraph [ref=e68]: If you’ve always wanted to learn how to dive, this course is for you. This course is for beginners and provides the essential knowledge and skills needed to prepare for open water diving.
          - paragraph [ref=e69]: The BSAC Ocean Diver course prepares for this in the safety of a swimming pool or sheltered water and an introduction to open water in a controlled, safe manner. Experience and confidence will be gained under the guidance of a qualified instructor. Maximum depth - 20m.
          - heading "Prerequisites" [level=4] [ref=e70]
          - paragraph [ref=e71]:
            - text: To enrol on the BSAC Ocean Diver Course you must be 12 years or older.
            - text: A basic level of comfort in the water is important and you will have to demonstrate that you can swim 200m in swimwear.
          - heading "What you’ll learn" [level=4] [ref=e72]
          - paragraph [ref=e73]: "The BSAC Ocean Diver course has three main stages:"
          - list [ref=e74]:
            - listitem [ref=e75]: Lessons and theory assessment on the basic principles of scuba diving
            - listitem [ref=e76]: Five confined water dives to learn the basics in the water (usually in a swimming pool)
            - listitem [ref=e77]: Five open water dives to further develop your scuba diving skills
          - heading "The fun bit" [level=4] [ref=e78]
          - paragraph [ref=e79]: Will hopefully be from start to finish! Learning to dive is a life changing experience for many people. Breathing underwater for the first time is something you will never forget and the experience of learning with others is great fun. Your instructor is trained to look after you every step of the way.
          - heading "Qualification and what that means" [level=4] [ref=e80]
          - paragraph [ref=e81]: "A BSAC Ocean Diver is defined as a diver who is competent to conduct dives:"
          - list [ref=e82]:
            - listitem [ref=e83]: to a maximum depth of 20m.
            - listitem [ref=e84]: with another BSAC Ocean Diver or with a BSAC Sports Diver, within the restrictions of the conditions already encountered during training.
            - listitem [ref=e85]: with a Dive Leader or higher grade, to expand experience beyond the conditions encountered during training, under the supervision of a Dive Manager.
            - listitem [ref=e86]: not requiring mandatory decompression stops.
            - listitem [ref=e87]: under the on-site supervision of a Dive Manager with respect to site selection, conditions and dive plan.
