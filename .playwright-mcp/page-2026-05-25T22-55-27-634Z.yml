  - generic [ref=e305]:
    - heading "Already A Diver" [level=1] [ref=e306]
    - paragraph [ref=e307]: Qualifications from PADI, SSI, SSAC, SAA and other agencies are all recognised — it's easy to dive with us.
    - paragraph [ref=e308]: If you have a recognised qualification you do not have to do any cross-over or further training (unless you want to!). It doesn't matter who you trained with (recreational, commercial or military), if you've never dived in the UK before or if you haven't dived for a few seasons - all very welcome - please join us!
    - paragraph [ref=e309]: Instructors who have trained with other agencies are also exceptionally welcome. There is a straightforward induction process which recognises instructor qualifications and accreditation to able to deliver BSAC instruction.
    - paragraph [ref=e310]: If you’re interested in experiencing diving with us, get in touch — we’d love to hear from you.
    - link "Contact Us" [ref=e311] [cursor=pointer]:
      - /url: /gbsacCore/Home/ContactUs
