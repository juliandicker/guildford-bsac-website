    - paragraph [ref=e128]: Guildford BSAC is a branch of the British Sub-Aqua Club, founded on 30 October 1957 at Guildford Lido by nine enthusiasts who became Branch 53 of BSAC. For nearly 70 years we have been training scuba divers and organising recreational diving around the UK and overseas.
