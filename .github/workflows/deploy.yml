name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build (security scan)
        run: dotnet build GuildfordBsac.Web.csproj -c Release -p:TreatWarningsAsErrors=true

      - name: Check for vulnerable packages
        run: |
          $out = dotnet list GuildfordBsac.Web.csproj package --vulnerable --include-transitive
          $out | Write-Host
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($out -match "has the following vulnerable packages") {
            Write-Error "Vulnerable NuGet packages found - update before deploying"
            exit 1
          }

      - name: Test
        run: dotnet test GuildfordBsac.Web.Tests/GuildfordBsac.Web.Tests.csproj -c Release --logger "console;verbosity=normal" --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/*/coverage.cobertura.xml
          if-no-files-found: warn

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish GuildfordBsac.Web.csproj -c Release -o publish -p:UseAppHost=false

      - name: Generate web.config
        env:
          RECAPTCHA_API_KEY: ${{ secrets.RECAPTCHA_API_KEY }}
          PRIVATE_KEY: ${{ secrets.SERVICE_ACCOUNT_PRIVATE_KEY }}
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          $privateKey = ($env:PRIVATE_KEY -replace "`r`n", '\n' -replace "`n", '\n')
          $escapedApiKey = [System.Security.SecurityElement]::Escape($env:RECAPTCHA_API_KEY)
          $escapedPrivateKey = [System.Security.SecurityElement]::Escape($privateKey)
          $escapedFbToken = [System.Security.SecurityElement]::Escape($env:FACEBOOK_TOKEN)
          $xml = @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <httpErrors errorMode="Custom" existingResponse="PassThrough" />
                <httpProtocol>
                  <customHeaders>
                    <remove name="X-Powered-By" />
                  </customHeaders>
                </httpProtocol>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified" />
                </handlers>
                <aspNetCore processPath="dotnet" arguments=".\GuildfordBsac.Web.dll" stdoutLogEnabled="true" stdoutLogFile=".\logs\stdout" hostingModel="outofprocess">
                  <environmentVariables>
                    <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" />
                    <environmentVariable name="AppSettings__RecaptchaApiKey" value="$escapedApiKey" />
                    <environmentVariable name="AppSettings__RecaptchaSiteKey" value="6LfEV_wsAAAAAMQzxEIKxFMDMKkxAiNXU7IRo-b-" />
                    <environmentVariable name="AppSettings__WkHtmlPdfCustomSwitches" value="--print-media-type --disable-smart-shrinking --encoding utf-8 --orientation landscape --page-size A2 -T 0 -B 0 -R 0 -L 0" />
                    <environmentVariable name="AppSettings__ServiceAccount__PrivateKey" value="$escapedPrivateKey" />
                    <environmentVariable name="AppSettings__ServiceAccount__UserEmail" value="gbsacadmin@guildford-bsac.com" />
                    <environmentVariable name="Facebook__PageAccessToken" value="$escapedFbToken" />
                    <environmentVariable name="AppSettings__CalendarIds__0" value="c_eo5g5mq6klkuhoc9us9r7e26fc@group.calendar.google.com" />
                    <environmentVariable name="AppSettings__CalendarIds__1" value="c_1v9tf1n7rali13nvf95ak4lc7k@group.calendar.google.com" />
                    <environmentVariable name="AppSettings__CalendarIds__2" value="c_670f59ed3f5r9fbd4molm2225s@group.calendar.google.com" />
                    <environmentVariable name="AppSettings__CalendarIds__3" value="c_2cedqq8lnc5d016ggctuse8nko@group.calendar.google.com" />
                    <environmentVariable name="AppSettings__CalendarIds__4" value="c_3orvtp2a88fve2ffsca6vd8tqc@group.calendar.google.com" />
                  </environmentVariables>
                </aspNetCore>
              </system.webServer>
            </location>
          </configuration>
          "@
          Set-Content -Path "publish\web.config" -Value $xml -Encoding UTF8

      - name: Create logs directory
        run: New-Item -ItemType Directory -Force -Path "publish\logs"

      - name: Deploy via Web Deploy
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          DEPLOY_USERNAME: ${{ vars.DEPLOY_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          $src  = "${{ github.workspace }}\publish"
          $dest = "contentPath='guildford-bsac.com',computerName='$env:DEPLOY_URL',userName='$env:DEPLOY_USERNAME',password='$env:DEPLOY_PASSWORD',authType='Basic'"
          $skip = "objectname='filePath',absolutePath='appsettings\.json$'"
          & $msdeploy -verb:sync "-source:contentPath=$src" "-dest:$dest" "-skip:$skip" -allowUntrusted -enableRule:AppOffline
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  zap-scan:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ vars.SITE_URL }}
          token: ${{ secrets.GITHUB_TOKEN }}
          rules_file_name: .zap/rules.tsv
          fail_action: true
          allow_issue_writing: false
