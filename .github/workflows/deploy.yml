name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (security scan)
        run: dotnet build GuildfordBsac.Web.csproj -c Release -p:TreatWarningsAsErrors=true

      - name: Check for vulnerable packages
        run: |
          $out = dotnet list GuildfordBsac.Web.csproj package --vulnerable --include-transitive
          $out | Write-Host
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($out -match "has the following vulnerable packages") {
            Write-Error "Vulnerable NuGet packages found - update before deploying"
            exit 1
          }

      - name: Test
        run: dotnet test GuildfordBsac.Web.Tests/GuildfordBsac.Web.Tests.csproj -c Release --logger "console;verbosity=normal" --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/*/coverage.cobertura.xml
          if-no-files-found: warn

      - name: Publish
        run: dotnet publish GuildfordBsac.Web.csproj -c Release -o publish -p:UseAppHost=false --no-build

      - name: Generate web.config
        env:
          RECAPTCHA_SECRET: ${{ secrets.RECAPTCHA_SECRET }}
          PRIVATE_KEY: ${{ secrets.SERVICE_ACCOUNT_PRIVATE_KEY }}
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          $pk = ($env:PRIVATE_KEY -replace "`r`n", '\n' -replace "`n", '\n')
          $r  = [System.Security.SecurityElement]::Escape($env:RECAPTCHA_SECRET)
          $pk = [System.Security.SecurityElement]::Escape($pk)
          $fb = [System.Security.SecurityElement]::Escape($env:FACEBOOK_TOKEN)
          $xml = @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <httpProtocol>
                  <customHeaders>
                    <remove name="X-Powered-By" />
                  </customHeaders>
                </httpProtocol>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified" />
                </handlers>
                <aspNetCore processPath="dotnet" arguments=".\GuildfordBsac.Web.dll" stdoutLogEnabled="true" stdoutLogFile=".\logs\stdout" hostingModel="outofprocess">
                  <environmentVariables>
                    <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" />
                    <environmentVariable name="AppSettings__RecaptchaSecret" value="$r" />
                    <environmentVariable name="AppSettings__ServiceAccount__PrivateKey" value="$pk" />
                    <environmentVariable name="Facebook__PageAccessToken" value="$fb" />
                  </environmentVariables>
                </aspNetCore>
              </system.webServer>
            </location>
          </configuration>
          "@
          Set-Content -Path "publish\web.config" -Value $xml -Encoding UTF8

      - name: Create logs directory
        run: New-Item -ItemType Directory -Force -Path "publish\logs"

      - name: Deploy via Web Deploy
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          DEPLOY_USERNAME: ${{ vars.DEPLOY_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          $src  = "${{ github.workspace }}\publish"
          $dest = "contentPath='guildford-bsac.com',computerName='$env:DEPLOY_URL',userName='$env:DEPLOY_USERNAME',password='$env:DEPLOY_PASSWORD',authType='Basic'"
          $skip = "objectname='filePath',absolutePath='appsettings\.json$'"
          & $msdeploy -verb:sync "-source:contentPath=$src" "-dest:$dest" "-skip:$skip" -allowUntrusted -enableRule:AppOffline
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  zap-scan:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.SITE_URL }}
          token: ${{ secrets.GITHUB_TOKEN }}
          rules_file_name: .zap/rules.tsv
          fail_action: true
          allow_issue_writing: false
