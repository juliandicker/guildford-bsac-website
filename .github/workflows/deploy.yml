name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for private repos; see https://gitleaks.io/products.html
          # For public repos this step runs without a license.

  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build (security scan)
        run: dotnet build GuildfordBsac.Web.csproj -c Release -p:TreatWarningsAsErrors=true

      - name: Check for vulnerable packages
        run: |
          $out = dotnet list GuildfordBsac.Web.csproj package --vulnerable --include-transitive
          $out | Write-Host
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($out -match "has the following vulnerable packages") {
            Write-Error "Vulnerable NuGet packages found - update before deploying"
            exit 1
          }

      - name: Test
        run: dotnet test GuildfordBsac.Web.Tests/GuildfordBsac.Web.Tests.csproj -c Release --logger "console;verbosity=normal" --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/*/coverage.cobertura.xml
          if-no-files-found: warn

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish GuildfordBsac.Web.csproj -c Release -o publish -p:UseAppHost=false

      - name: Generate web.config
        # SECURITY NOTE: Secrets are injected here from GitHub Actions secrets, not stored in Plesk.
        # Plesk's "Environment Variables" UI also writes to web.config, but MsDeploy overwrites
        # web.config on every deploy — so anything set via Plesk is lost immediately. GitHub secrets
        # injection is the only mechanism that survives across deploys.
        # web.config itself is safe to hold secrets: IIS refuses to serve it over HTTP (403).
        # To rotate a secret: update the GitHub Actions secret, then re-run this workflow.
        env:
          SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.SERVICE_ACCOUNT_PRIVATE_KEY }}
          RECAPTCHA_API_KEY: ${{ secrets.RECAPTCHA_API_KEY }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
          CONTACT_EMAIL_BCC: ${{ vars.CONTACT_EMAIL_BCC }}
        run: |
          # Private key escaping: the GitHub secret contains actual newlines (CRLF or LF).
          # Step 1: replace actual newlines with the two-character literal sequence \n
          #   (backtick sequences are PowerShell escape chars; single-quoted '\n' is a literal backslash-n)
          # Step 2: XML-escape the result — SecurityElement.Escape only escapes < > & " ' so \n is preserved
          # GoogleCalendarApiService/GoogleEmailApiService then does Replace("\\n", "\n") to restore newlines.
          $privateKey = ($env:SERVICE_ACCOUNT_PRIVATE_KEY -replace "`r`n", '\n' -replace "`n", '\n')
          $escapedPrivateKey = [System.Security.SecurityElement]::Escape($privateKey)
          $escapedRecaptchaKey = [System.Security.SecurityElement]::Escape($env:RECAPTCHA_API_KEY)
          $escapedFbToken = [System.Security.SecurityElement]::Escape($env:FACEBOOK_PAGE_ACCESS_TOKEN)
          $escapedContactEmail = [System.Security.SecurityElement]::Escape($env:CONTACT_EMAIL)
          $escapedContactEmailBcc = [System.Security.SecurityElement]::Escape($env:CONTACT_EMAIL_BCC)
          $xml = @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <location path="." inheritInChildApplications="false">
              <system.webServer>
                <httpErrors errorMode="Custom" existingResponse="PassThrough" />
                <httpProtocol>
                  <customHeaders>
                    <remove name="X-Powered-By" />
                  </customHeaders>
                </httpProtocol>
                <handlers>
                  <add name="aspNetCore" path="*" verb="*" modules="AspNetCoreModuleV2" resourceType="Unspecified" />
                </handlers>
                <aspNetCore processPath="dotnet" arguments=".\GuildfordBsac.Web.dll" stdoutLogEnabled="false" stdoutLogFile=".\logs\stdout" hostingModel="outofprocess">
                  <environmentVariables>
                    <environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" />
                    <environmentVariable name="AppSettings__ServiceAccount__PrivateKey" value="$escapedPrivateKey" />
                    <environmentVariable name="AppSettings__RecaptchaApiKey" value="$escapedRecaptchaKey" />
                    <environmentVariable name="Facebook__PageAccessToken" value="$escapedFbToken" />
                    <environmentVariable name="AppSettings__ContactEmail" value="$escapedContactEmail" />
                    <environmentVariable name="AppSettings__ContactEmailBcc" value="$escapedContactEmailBcc" />
                  </environmentVariables>
                </aspNetCore>
              </system.webServer>
            </location>
          </configuration>
          "@
          Set-Content -Path "publish\web.config" -Value $xml -Encoding UTF8

      - name: Create logs directory
        run: New-Item -ItemType Directory -Force -Path "publish\logs"

      - name: Deploy via Web Deploy
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          DEPLOY_USERNAME: ${{ vars.DEPLOY_USERNAME }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          $src  = "${{ github.workspace }}\publish"
          $dest = "contentPath='guildford-bsac.com',computerName='$env:DEPLOY_URL',userName='$env:DEPLOY_USERNAME',password='$env:DEPLOY_PASSWORD',authType='Basic'"
          # No skip rule for appsettings.json — all secrets are in web.config env vars (above),
          # so appsettings.json and appsettings.Production.json are safe to deploy on every push.
          & $msdeploy -verb:sync "-source:contentPath=$src" "-dest:$dest" -allowUntrusted -enableRule:AppOffline
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Post-deploy health check
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          $healthUrl = "$env:SITE_URL/health"
          $maxAttempts = 10
          $delaySeconds = 6
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              $response = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check passed (attempt $i)"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i/$maxAttempts failed: $_"
            }
            if ($i -lt $maxAttempts) { Start-Sleep -Seconds $delaySeconds }
          }
          Write-Error "Health check did not pass after $maxAttempts attempts"
          exit 1

  zap-scan:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ vars.SITE_URL }}
          token: ${{ secrets.GITHUB_TOKEN }}
          rules_file_name: .zap/rules.tsv
          fail_action: true
          allow_issue_writing: false
